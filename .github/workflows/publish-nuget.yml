name: Publish NBXplorer.Client NuGet to GitHub Packages

on:
  push:
    branches: [ master ]
    paths:
      - 'NBXplorer.Client/**'
      - '.github/workflows/publish-nuget.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            --username cadenadb \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/cadenadb/index.json"

      - name: Restore
        run: dotnet restore NBXplorer.Client/NBXplorer.Client.csproj

      - name: Build
        run: dotnet build NBXplorer.Client/NBXplorer.Client.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack NBXplorer.Client/NBXplorer.Client.csproj -c Release --no-build -o ./nupkg

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "github" \
            --skip-duplicate
